<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nebenkosten- & Stromrechner (THB)</title>
<meta name="description" content="Strom- und Wasserkosten in Thailand schätzen und Nebenkosten der Wohnung berechnen.">
<link rel="stylesheet" href="../shared/shared.css"></head><body>
<header class="app"><a class="home" href="../index.html">←</a><h1>⚡ Nebenkosten-Rechner</h1><p>Strom · Wasser · Wohnung (THB)</p></header>
<div class="wrap"><main>
<div class="card">
  <label>Stromverbrauch</label>
  <div class="grid two">
    <div><input id="kwh" type="number" inputmode="decimal" placeholder="kWh (Zähler-Differenz)" oninput="calc()"><div class="muted">kWh</div></div>
    <div><input id="preis" type="number" inputmode="decimal" value="7" oninput="calc()"><div class="muted">THB/kWh</div></div>
  </div>
  <p class="muted">Vermieter verlangen oft 7–8 THB/kWh statt staatl. ~4–5. Im Mietvertrag prüfen!</p>
  <div class="result" id="strom">0 ฿</div>
</div>
<div class="card">
  <label>Weitere monatliche Kosten</label>
  <div class="grid two"><div><input id="wasser" type="number" placeholder="Wasser THB" oninput="calc()"><div class="muted">Wasser</div></div>
  <div><input id="internet" type="number" placeholder="Internet THB" oninput="calc()"><div class="muted">Internet</div></div></div>
  <div class="grid two" style="margin-top:8px"><div><input id="common" type="number" placeholder="Common fee" oninput="calc()"><div class="muted">Common fee</div></div>
  <div><input id="sonst" type="number" placeholder="Sonstiges" oninput="calc()"><div class="muted">Sonstiges</div></div></div>
  <hr><div class="muted" style="text-align:center">Nebenkosten gesamt / Monat</div><div class="result" id="ges">0 ฿</div>
</div>
</main></div>
<script src="../shared/config.js"></script><script src="../shared/shared.js"></script>
<script>
function v(id){return parseFloat(document.getElementById(id).value)||0;}
function calc(){var s=v('kwh')*v('preis');document.getElementById('strom').textContent=Math.round(s).toLocaleString('de-DE')+' ฿';
  var g=s+v('wasser')+v('internet')+v('common')+v('sonst');document.getElementById('ges').textContent=Math.round(g).toLocaleString('de-DE')+' ฿';}
calc();injectBlend('main');injectFooter();
</script>
</body></html>
