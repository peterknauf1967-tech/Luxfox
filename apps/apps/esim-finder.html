<!doctype html><html lang="de"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>eSIM-Finder Südostasien</title>
<meta name="description" content="Beste eSIM-Datenpakete für Thailand, Vietnam, Kambodscha und Laos finden.">
<link rel="stylesheet" href="../shared/shared.css"></head><body>
<header class="app"><a class="home" href="../index.html">←</a><h1>📶 eSIM-Finder</h1><p>Daten für TH · VN · KH · LA</p></header>
<div class="wrap"><main>
<div class="card">
  <label>Land / Region</label>
  <select id="land" onchange="render()"><option>Thailand</option><option>Vietnam</option><option>Kambodscha</option><option>Laos</option><option>Ganz Südostasien</option></select>
  <label>Aufenthalt</label>
  <select id="dauer" onchange="render()"><option>bis 7 Tage</option><option>bis 30 Tage</option><option>länger / dauerhaft</option></select>
</div>
<div id="empf"></div>
<div class="note">Tipp: Prüfe, ob dein Samsung S24 Ultra die eSIM des Anbieters unterstützt (tut es). Für Daueraufenthalt ist oft eine lokale SIM (AIS/True/dtac) günstiger als eSIM.</div>
</main></div>
<script src="../shared/config.js"></script><script src="../shared/shared.js"></script>
<script>
function render(){var d=document.getElementById('dauer').value;
  var rec=d.indexOf('länger')>=0?'Für lange Aufenthalte: lokale SIM vor Ort, eSIM nur zur Überbrückung.':'Für Kurz-/Mittelaufenthalt sind eSIMs am bequemsten – sofort startklar.';
  var h='<div class="card"><p>'+rec+'</p></div>';
  h+='<div class="card"><b>Airalo</b><p class="muted">Größter eSIM-Anbieter, 200+ Länder, einfache App.</p>'+affBtn('airalo','Airalo-Paket ansehen')+'</div>';
  h+='<div class="card"><b>Saily (NordVPN-Team)</b><p class="muted">Asien-Regionalpaket, gute Geschwindigkeit.</p>'+affBtn('nordvpn','Saily/NordVPN ansehen')+'</div>';
  document.getElementById('empf').innerHTML=h;}
render();injectBlend('main');injectFooter();
</script>
</body></html>
